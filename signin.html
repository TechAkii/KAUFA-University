<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KAUFA - SignUp</title>
    <link rel="icon" type="image/png" href="2.png"> 
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        /* 🔥 Modern Gradient Background */
        body {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            animation: bgMove 12s infinite alternate ease-in-out;
            padding: 20px;
        }

        @keyframes bgMove {
            0% {
                background-position: left;
            }

            100% {
                background-position: right;
            }
        }

        /* 🔥 Premium Glass Card */
        .content {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            padding: 40px;
            backdrop-filter: blur(15px);
            color: white;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #ffffff;
        }

        .input-box {
            position: relative;
            margin: 20px 0;
        }

        .input-box input {
            width: 100%;
            height: 52px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.4px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 0 50px 0 20px;
            font-size: 16px;
            color: #fff;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #9b59b6;
            box-shadow: 0 0 10px #9b59b6;
        }

        .input-box input::placeholder {
            color: #ccc;
        }

        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #f1f1f1;
        }

        .btnn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
            color: #000;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
        }

        .btnn:hover {
            background: linear-gradient(135deg, #f7d35c, #e1a805);
            transform: translateY(-2px);
        }

        @media (max-width: 500px) {
            .content {
                padding: 30px;
            }

            h2 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

    <div class="content">
        <form action="signup.php" method="POST">

            <h2>Login</h2>

            <div class="input-box">
                <input type="email" name="email" placeholder="Student Email" required>

                <i class="ri-mail-fill"></i>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
                <i class="ri-lock-fill"></i>
            </div>
            <div class="input-box">
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                <i class="ri-lock-fill"></i>
            </div>

            <p id="message" style="color:red; text-align:center;"></p>

            <button type="submit" class="btnn">Register</button>
        </form>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const message = document.getElementById("message");

        if (params.get("error") === "email_exists") {
            message.textContent = "Email already registered!";
        }

        if (params.get("error") === "password_mismatch") {
            message.textContent = "Passwords do not match!";
        }

        if (params.get("success") === "1") {
            message.style.color = "green";
            message.textContent = "Registration successful!";
        }

        // 🔥 Remove query from URL
        if (window.location.search) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        document.querySelectorAll("input").forEach(input => {
            input.addEventListener("input", () => {
                message.textContent = "";
            });
        });
    </script>


</body>

</html>
